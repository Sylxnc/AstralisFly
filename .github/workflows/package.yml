name: Package

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Remove potentially corrupted Maven artifacts
        run: |
          rm -rf ~/.m2/repository/net/kyori/adventure-api

      - name: Build package
        run: mvn -B -U -DskipTests clean package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstralisFly-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error

