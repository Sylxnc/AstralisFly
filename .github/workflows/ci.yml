name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Remove potentially corrupted Maven artifacts
        run: |
          rm -rf ~/.m2/repository/net/kyori/adventure-api

      - name: Build and test
        run: mvn -B -U clean verify

