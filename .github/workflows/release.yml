name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # GitHub Release erstellen
      packages: write       # GitHub Packages veröffentlichen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (GitHub Packages)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Generiert automatisch ~/.m2/settings.xml mit dem github-Server
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Build JAR
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Get project version
        id: project
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Delete broken package version (if exists)
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          PKG="net.astralis.AstralisFly"
          OWNER="${{ github.repository_owner }}"

          VERSION_ID=$(gh api "users/${OWNER}/packages/maven/${PKG}/versions" \
            --jq ".[] | select(.name==\"${VERSION}\") | .id" 2>/dev/null || true)

          if [ -n "$VERSION_ID" ]; then
            echo "Deleting broken package version ${VERSION} (id=${VERSION_ID})..."
            gh api --method DELETE "users/${OWNER}/packages/maven/${PKG}/versions/${VERSION_ID}"
            echo "Deleted."
          else
            echo "No existing package version found – fresh deploy."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Deploy to GitHub Packages
        run: |
          mvn deploy:deploy-file \
            -e \
            --no-transfer-progress \
            -Dfile=target/AstralisFly-${{ steps.project.outputs.version }}.jar \
            -DgroupId=net.astralis \
            -DartifactId=AstralisFly \
            -Dversion=${{ steps.project.outputs.version }} \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/${{ github.repository_owner }}/AstralisFly \
            -DgeneratePom=true
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR as GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/AstralisFly-*.jar
          generate_release_notes: true
