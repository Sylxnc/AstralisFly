name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Get project version
        id: project
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Delete existing package version (if exists)
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          PKG="net.astralis.AstralisFly"
          OWNER="${{ github.repository_owner }}"
          VERSION_ID=$(gh api "users/${OWNER}/packages/maven/${PKG}/versions" \
            --jq ".[] | select(.name==\"${VERSION}\") | .id" 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting package version ${VERSION} (id=${VERSION_ID})..."
            gh api --method DELETE "users/${OWNER}/packages/maven/${PKG}/versions/${VERSION_ID}"
          else
            echo "No existing package version found."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Deploy to GitHub Packages via curl
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          JAR="target/AstralisFly-${VERSION}.jar"
          OWNER="${{ github.repository_owner }}"
          REPO="AstralisFly"
          BASE_URL="https://maven.pkg.github.com/${OWNER}/${REPO}/net/astralis/AstralisFly/${VERSION}/AstralisFly-${VERSION}"

          # Minimal POM
          cat > /tmp/deploy.pom << EOF
<?xml version="1.0" encoding="UTF-8"?>
<project>
  <modelVersion>4.0.0</modelVersion>
  <groupId>net.astralis</groupId>
  <artifactId>AstralisFly</artifactId>
  <version>${VERSION}</version>
  <packaging>jar</packaging>
</project>
EOF

          upload() {
            local FILE=$1 URL=$2 TYPE=$3
            echo "→ PUT ${URL}"
            CODE=$(curl -s -w "%{http_code}" -o /tmp/resp.txt \
              -X PUT \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: ${TYPE}" \
              --data-binary "@${FILE}" \
              "${URL}")
            echo "  HTTP ${CODE}: $(cat /tmp/resp.txt)"
            [[ "$CODE" =~ ^2 ]] || { echo "Upload failed!"; exit 1; }
          }

          # Checksums
          sha1sum /tmp/deploy.pom | awk '{print $1}' | tr -d '\n' > /tmp/pom.sha1
          md5sum  /tmp/deploy.pom | awk '{print $1}' | tr -d '\n' > /tmp/pom.md5
          sha1sum "${JAR}"        | awk '{print $1}' | tr -d '\n' > /tmp/jar.sha1
          md5sum  "${JAR}"        | awk '{print $1}' | tr -d '\n' > /tmp/jar.md5

          upload /tmp/deploy.pom  "${BASE_URL}.pom"      "application/xml"
          upload /tmp/pom.sha1    "${BASE_URL}.pom.sha1" "text/plain"
          upload /tmp/pom.md5     "${BASE_URL}.pom.md5"  "text/plain"
          upload "${JAR}"         "${BASE_URL}.jar"      "application/java-archive"
          upload /tmp/jar.sha1    "${BASE_URL}.jar.sha1" "text/plain"
          upload /tmp/jar.md5     "${BASE_URL}.jar.md5"  "text/plain"

          echo "✅ Deployment successful!"

      - name: Upload JAR as GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/AstralisFly-*.jar
          generate_release_notes: true
