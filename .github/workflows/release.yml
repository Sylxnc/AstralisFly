name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # GitHub Release erstellen
      packages: write       # GitHub Packages veröffentlichen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (GitHub Packages)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Generiert automatisch ~/.m2/settings.xml mit dem github-Server
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Build JAR
        run: mvn clean package --no-transfer-progress -DskipTests

      - name: Get project version
        id: project
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Packages
        run: |
          mvn deploy:deploy-file \
            --no-transfer-progress \
            -Dfile=target/AstralisFly-${{ steps.project.outputs.version }}.jar \
            -DgroupId=net.astralis \
            -DartifactId=AstralisFly \
            -Dversion=${{ steps.project.outputs.version }} \
            -Dpackaging=jar \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/sylxnc/AstralisFly \
            -DgeneratePom=true
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR as GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/AstralisFly-*.jar
          generate_release_notes: true
